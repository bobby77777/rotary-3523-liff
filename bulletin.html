<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扶輪社刊</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --c-primary: #00246B;
            --c-secondary: #D4AF37;
            --c-bg: #F8F9FA;
            --c-text: #333333;
            --c-text-light: #6c757d;
            --font-head: 'Noto Serif TC', serif;
            --font-body: 'Noto Sans TC', sans-serif;
            --canva-ui-bg: #18191B;
            --canva-ui-panel: #252627;
            --canva-ui-text: #FFFFFF;
            --canva-accent: #8B3DFF;
            /* 畫布縮放比例，由 fitCanvas() 依視窗寬度即時計算，桌機維持 1 */
            --canvas-scale: 1;
        }

        body { margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; background-color: #E6E7E9; display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; -webkit-text-size-adjust: 100%; }

        /* --- 頂部主導覽列 --- */
        .top-nav { background-color: var(--canva-ui-bg); display: flex; padding: 0 20px; align-items: center; z-index: 20; box-shadow: 0 2px 5px rgba(0,0,0,0.2); flex-shrink: 0; }
        .nav-logo { color: #fff; font-weight: bold; font-size: 16px; margin-right: 30px; display: flex; align-items: center; gap: 8px; }
        .nav-logo span { background: var(--canva-accent); padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .tool-tab { color: #A6A7A9; display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; transition: 0.2s; padding: 15px 20px; border-bottom: 3px solid transparent; font-weight: bold; }
        .tool-tab:hover { color: var(--canva-ui-text); background-color: rgba(255,255,255,0.05); }
        .tool-tab.active { color: var(--canva-ui-text); border-bottom-color: var(--canva-accent); }
        .tool-tab svg { width: 18px; height: 18px; fill: currentColor; }
        /* 匯出鍵：手機把工具列橫向捲動時，用 sticky 讓它固定在右緣不被捲走 */
        .export-tab { margin-left: auto; background: var(--canva-accent); color: #fff; border-radius: 6px; padding: 8px 16px; height: 34px; border: none; flex-shrink: 0; }
        .export-tab:hover { background: #7A33E6; color: #fff; }

        /* --- 第二層功能控制列 --- */
        .sub-panel-container { background-color: var(--canva-ui-panel); color: var(--canva-ui-text); z-index: 19; box-shadow: 0 4px 10px rgba(0,0,0,0.1); flex-shrink: 0; }
        .sub-panel { padding: 15px 30px; display: none; gap: 30px; align-items: center; flex-wrap: wrap; }
        .sub-panel.active { display: flex; }

        /* 控制項樣式 */
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .control-group label { font-size: 11px; color: #A6A7A9; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .btn-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; max-width: 500px; }
        .btn { background: #3F4042; color: #fff; border: 1px solid transparent; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: 0.2s; display: flex; align-items: center; gap: 6px; }
        .btn:hover { background: #4F5052; }
        .btn.active { border-color: var(--canva-accent); background: rgba(139, 61, 255, 0.2); box-shadow: 0 0 0 1px var(--canva-accent); }
        
        .color-dots { display: flex; gap: 4px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }

        .element-btn { font-size: 20px; padding: 5px 12px; }
        .gallery-btn { padding: 2px; background: transparent; border: 2px solid transparent; border-radius: 6px; cursor: pointer; }
        .gallery-btn img { width: 60px; height: 40px; object-fit: cover; border-radius: 4px; display: block; }
        .gallery-btn:hover { border-color: var(--canva-accent); }

        .tip-box { margin-left: auto; background: rgba(139,61,255,0.1); border: 1px dashed var(--canva-accent); padding: 8px 15px; border-radius: 6px; font-size: 12px; color: #ddd; }

        /* --- 中央編輯區 --- */
        .workspace { flex: 1; display: flex; justify-content: center; align-items: flex-start; position: relative; background-image: radial-gradient(#d1d1d1 1px, transparent 1px); background-size: 20px 20px; padding: 50px 40px; overflow: auto; -webkit-overflow-scrolling: touch; }
        /* stage 佔住「縮放後」的版面尺寸，wrapper 則維持 595x842 原始設計座標後再縮放。
           兩者分離，捲動範圍才會跟著縮放走，不會留下大片空白。 */
        .canvas-stage { width: calc(595px * var(--canvas-scale)); height: calc(842px * var(--canvas-scale)); flex-shrink: 0; margin: auto; position: relative; }
        .canvas-wrapper { position: absolute; top: 0; left: 0; width: 595px; height: 842px; transform: scale(var(--canvas-scale)); transform-origin: top left; }
        .canvas-label { position: absolute; top: -30px; left: 0; background: var(--canva-accent); color: white; padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .canvas { width: 595px; height: 842px; background-color: var(--c-bg); box-shadow: 0 15px 40px rgba(0,0,0,0.15); position: relative; display: flex; flex-direction: column; overflow: hidden; transition: background-color 0.3s ease; }

        /* --- 編輯與互動 --- */
        [contenteditable="true"] { outline: none; transition: outline 0.2s; }
        [contenteditable="true"]:hover { outline: 2px dashed rgba(139, 61, 255, 0.5); cursor: text; }
        [contenteditable="true"]:focus { outline: 2px solid var(--canva-accent); }
        
        .resize-x { resize: horizontal; overflow: hidden; padding-right: 15px; }
        .resize-both { resize: both; overflow: hidden; padding-right: 15px; padding-bottom: 10px; }
        .resize-x::-webkit-scrollbar, .resize-both::-webkit-scrollbar { display: none; }
        /* 觸控用縮放握把，桌機不產生也不顯示 (見 @media (hover: none)) */
        .touch-resize-handle { display: none; }

        .editable-image { cursor: pointer; transition: opacity 0.2s, outline 0.2s; }
        .editable-image:hover { opacity: 0.9; outline: 2px dashed var(--canva-accent); }

        .floating-item { position: absolute; cursor: move; z-index: 100; padding: 5px; border: 1px dashed transparent; transition: border 0.2s; touch-action: none; }
        .floating-item:hover, .floating-item:focus-within { border-color: var(--canva-accent); }
        .floating-item .delete-btn { position: absolute; top: -15px; right: -15px; background: #ff4757; color: white; width: 24px; height: 24px; border-radius: 50%; font-size: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transition: 0.2s; border: none; }
        .floating-item:hover .delete-btn { opacity: 1; }

        /* --- 刊頭 & 頁尾 --- */
        .page-header { background-color: var(--c-primary); color: #fff; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--c-secondary); transition: background-color 0.3s, border-color 0.3s; z-index: 10; }
        .page-header h2 { margin: 0; font-family: var(--font-body); font-size: 18px; letter-spacing: 2px; }
        .page-header .meta { font-size: 12px; text-align: right; opacity: 0.9; font-family: var(--font-body); }
        .page-footer { padding: 15px 30px; background-color: rgba(0,0,0,0.05); font-size: 11px; color: var(--c-text-light); display: flex; justify-content: space-between; margin-top: auto; font-family: var(--font-body); z-index: 10; }
        .page-content { flex: 1; position: relative; width: 100%; height: 100%; box-sizing: border-box; }

        /* --- P1 --- */
        .layout-p1a { display: flex; height: 100%; }
        .layout-p1a .text-area { width: 50%; padding: 50px 40px; display: flex; flex-direction: column; justify-content: center; z-index: 2; }
        .layout-p1a .img-area { width: 50%; height: 100%; position: relative; }
        .layout-p1a .img-area img { width: 100%; height: 100%; object-fit: cover; clip-path: polygon(15% 0, 100% 0, 100% 100%, 0 100%); }
        .layout-p1a .p1a-tag { font-family: var(--font-body); font-size: 12px; font-weight: bold; background: var(--c-secondary); color: #000; padding: 4px 12px; display: inline-block; margin-bottom: 20px; align-self: flex-start; }
        .p1a-name { font-family: var(--font-head); font-size: 48px; color: var(--c-primary); margin: 0 0 5px 0; line-height: 1.1; font-weight: 900; }
        .p1a-title { font-family: var(--font-body); font-size: 16px; color: var(--c-text-light); margin-bottom: 30px; }
        .p1a-topic { font-family: var(--font-head); font-size: 24px; color: var(--c-text); margin-bottom: 20px; font-weight: bold; line-height: 1.3; text-wrap: balance; }
        .p1a-bio { font-family: var(--font-body); font-size: 13px; color: var(--c-text-light); line-height: 1.8; text-align: justify; text-justify: inter-ideograph; text-wrap: pretty; }

        .layout-p1b { display: flex; height: 100%; padding: 40px; box-sizing: border-box; gap: 30px; }
        .p1b-left { width: 35%; background: var(--c-primary); border-radius: 12px; padding: 30px; display: flex; flex-direction: column; align-items: center; text-align: center; color: white; }
        .p1b-left img { width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--c-secondary); margin-bottom: 20px; object-fit: cover; }
        .p1b-left .name { font-family: var(--font-head); font-size: 28px; font-weight: bold; margin-bottom: 10px; }
        .p1b-left .title { font-family: var(--font-body); font-size: 14px; opacity: 0.9; }
        .p1b-right { width: 65%; display: flex; flex-direction: column; justify-content: center; }
        .p1b-right .box { border-left: 4px solid var(--c-secondary); padding-left: 20px; margin-bottom: 30px; }
        .p1b-right .topic { font-family: var(--font-head); font-size: 26px; color: var(--c-primary); font-weight: bold; margin-bottom: 15px; text-wrap: balance; }
        .p1b-right .bio { font-family: var(--font-body); font-size: 14px; color: var(--c-text); line-height: 1.8; text-align: justify; text-justify: inter-ideograph; text-wrap: pretty; }

        /* --- P2 --- */
        .layout-p2 { padding: 40px 60px; box-sizing: border-box; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .p2-title { font-family: var(--font-head); font-size: 32px; color: var(--c-primary); margin-bottom: 20px; text-align: center; font-weight: bold; border-bottom: 2px solid var(--c-secondary); padding-bottom: 15px; flex-shrink: 0; }
        .timeline-container { flex: 1; overflow-y: auto; padding-right: 10px; margin-bottom: 5px; }
        .timeline-container::-webkit-scrollbar { width: 5px; }
        .timeline-container::-webkit-scrollbar-track { background: transparent; }
        .timeline-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
        .timeline { position: relative; max-width: 420px; margin: 0 auto; padding-bottom: 10px; }
        .timeline::before { content: ''; position: absolute; left: 80px; top: 0; bottom: 0; width: 2px; background: var(--c-secondary); }
        .timeline-item { position: relative; margin-bottom: 25px; display: flex; align-items: flex-start; }
        .time-col { width: 60px; padding-right: 20px; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .time { font-family: var(--font-body); font-weight: bold; color: var(--c-primary); font-size: 16px; line-height: 1; }
        .duration { font-family: var(--font-body); font-size: 11px; font-weight: bold; background: rgba(0,0,0,0.06); color: var(--c-text-light); padding: 3px 6px; border-radius: 4px; line-height: 1; white-space: nowrap; }
        .event-dot { position: absolute; left: 74px; top: 2px; width: 10px; height: 10px; border-radius: 50%; background: var(--c-secondary); border: 2px solid var(--c-bg); }
        .event-detail { padding-left: 35px; flex: 1; padding-right: 50px; }
        .item-controls { position: absolute; right: -15px; top: 0; display: flex; gap: 5px; opacity: 0; transition: 0.2s; z-index: 10; }
        .timeline-item:hover .item-controls { opacity: 1; }
        .item-controls button { background: #fff; border: 1px solid var(--c-secondary); color: var(--c-primary); width: 24px; height: 24px; border-radius: 4px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 16px; padding: 0; }
        .item-controls button:hover { background: var(--c-secondary); color: #000; }
        .timeline-add-btn { margin: 10px auto 10px; display: block; background: var(--c-secondary); color: #000; font-weight: bold; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-family: var(--font-body); transition: 0.2s; }
        .timeline-add-btn:hover { background: #E5BE45; transform: translateY(-2px); }
        .event-name { font-family: var(--font-head); font-size: 18px; color: var(--c-text); font-weight: bold; margin-bottom: 4px; line-height: 1.2; }
        .event-person { font-family: var(--font-body); font-size: 13px; color: var(--c-text-light); }

        .rotary-creed-footer { padding-top: 15px; margin-top: 5px; border-top: 1px solid #DEE2E6; flex-shrink: 0; position: relative; }
        .rotary-creed-footer::before { content: ''; position: absolute; top: -1px; left: 0; width: 80px; height: 3px; background: var(--c-secondary); }
        .creed-item { margin-bottom: 8px; }
        .creed-item:last-child { margin-bottom: 0; }
        .creed-label { font-family: var(--font-head); font-weight: 900; color: var(--c-primary); font-size: 14px; margin-bottom: 2px; }
        .creed-content { font-size: 12px; color: var(--c-text); line-height: 1.5; text-align: justify; padding-left: 2px; }
        .creed-content strong { color: #C62828; font-weight: bold; }

        /* --- P3 --- */
        .layout-p3 { padding: 40px; box-sizing: border-box; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .p3-title { font-family: var(--font-head); font-size: 28px; color: var(--c-primary); margin-bottom: 10px; display: flex; align-items: center; gap: 10px; font-weight: bold; z-index: 10; position: relative;}
        .p3-title::after { content: ''; flex: 1; height: 1px; background: var(--c-secondary); }
        .collage-board { flex: 1; position: relative; width: 100%; height: 100%; }
        .collage-item { position: absolute; background: #ffffff; padding: 6px 6px 40px 6px; box-shadow: 2px 5px 15px rgba(0,0,0,0.2); border: 1px solid #e0e0e0; transition: box-shadow 0.2s; min-width: 120px; min-height: 120px; cursor: move; touch-action: none; }
        .collage-item:hover { box-shadow: 5px 12px 25px rgba(0,0,0,0.3); }
        .collage-item::after { content: ''; position: absolute; bottom: 0; right: 0; width: 20px; height: 20px; background: repeating-linear-gradient(135deg, transparent, transparent 2px, #ccc 2px, #ccc 4px); pointer-events: none; border-bottom-right-radius: 2px; opacity: 0; transition: opacity 0.2s; }
        .collage-item:hover::after { opacity: 1; background: repeating-linear-gradient(135deg, transparent, transparent 2px, var(--canva-accent) 2px, var(--canva-accent) 4px); }
        .collage-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; pointer-events: none; }
        .polaroid-caption { position: absolute; bottom: 10px; left: 8px; right: 8px; text-align: center; font-size: 14px; font-family: var(--font-body); color: #333; font-weight: 700; border-bottom: 1px dashed transparent; }
        .polaroid-caption:hover { border-bottom-color: #999; }
        .photo-tools { position: absolute; top: 10px; right: 10px; display: flex; gap: 6px; opacity: 0; transition: 0.2s; z-index: 20; }
        .collage-item:hover .photo-tools { opacity: 1; }
        .photo-tools button { background: #fff; border: 1px solid var(--canva-accent); color: var(--canva-accent); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 6px rgba(0,0,0,0.2); transition: 0.2s; }
        .photo-tools button:hover { background: var(--canva-accent); color: #fff; transform: scale(1.1); }
        .rotate-handle { cursor: grab !important; }
        .rotate-handle:active { cursor: grabbing !important; }
        .photo-grid { flex: 1; display: grid; gap: 15px; min-height: 0; margin-top: 15px; }
        .photo-grid .item { border-radius: 8px; overflow: hidden; background: #ddd; position: relative; }
        .photo-grid .item img { width: 100%; height: 100%; object-fit: cover; }
        .grid-5 { grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); }
        .grid-5 .item:nth-child(1) { grid-column: 1 / span 2; grid-row: 1 / span 2; }
        .grid-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .grid-7 { grid-template-columns: repeat(3, 1fr); grid-template-rows: 2fr 1fr 1fr; }
        .grid-7 .item:nth-child(1) { grid-column: 1 / -1; }
        .grid-8 { grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); }
        .grid-9 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); }
        .photo-grid .caption { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); color: white; padding: 8px; font-size: 13px; font-family: var(--font-body); font-weight: bold; text-align: center; }

        /* --- P4 --- */
        .layout-p4 { padding: 40px 50px; box-sizing: border-box; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .p4-main-title { font-family: var(--font-head); font-size: 32px; color: var(--c-primary); margin-bottom: 20px; text-align: center; font-weight: bold; border-bottom: 2px solid var(--c-secondary); padding-bottom: 15px; flex-shrink: 0; }
        .p4-dual-headers { display: flex; gap: 30px; flex-shrink: 0; padding-right: 15px; margin-bottom: 15px; }
        .p4-col-title { flex: 1; font-size: 20px; color: #fff; background: var(--c-primary); padding: 8px 15px; border-radius: 4px; font-weight: bold; display: flex; align-items: center; justify-content: space-between; border-left: 6px solid var(--c-secondary); margin: 0; }
        .p4-scroll-area { flex: 1; overflow-y: auto; padding-right: 10px; padding-bottom: 20px; }
        .p4-scroll-area::-webkit-scrollbar { width: 5px; }
        .p4-scroll-area::-webkit-scrollbar-track { background: transparent; }
        .p4-scroll-area::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
        .p4-scroll-area::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.3); }
        .p4-dual-columns-body { display: flex; gap: 30px; }
        .p4-col-body { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .p4-card { background: #fff; border: 1px solid #E6E7E9; border-left: 4px solid var(--c-primary); padding: 15px; border-radius: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.03); transition: box-shadow 0.2s; position: relative; }
        .p4-card:hover { box-shadow: 0 6px 12px rgba(0,0,0,0.08); border-left-color: var(--c-secondary); }
        .p4-card-title { font-size: 15px; font-weight: bold; color: var(--c-primary); margin-bottom: 10px; line-height: 1.3; }
        .p4-meta { display: flex; font-size: 13px; margin-bottom: 6px; line-height: 1.4; color: var(--c-text); }
        .p4-meta-label { width: 50px; flex-shrink: 0; color: var(--c-text-light); font-weight: bold; }
        .p4-meta-val { flex: 1; }
        .p4-list-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .p4-list-scroll { flex: 1; overflow-y: auto; padding-right: 10px; padding-bottom: 20px; display: flex; flex-direction: column; gap: 15px; }
        .p4-list-scroll::-webkit-scrollbar { width: 5px; }
        .p4-list-scroll::-webkit-scrollbar-track { background: transparent; }
        .p4-list-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
        .p4-list-group-title { font-size: 18px; color: var(--c-primary); font-weight: bold; border-bottom: 1px solid var(--c-secondary); padding-bottom: 8px; margin-bottom: 5px; flex-shrink: 0; }
        .p4-list-item { display: flex; padding: 12px 15px; background: #fff; border-radius: 6px; align-items: center; gap: 20px; position: relative; border-left: 3px solid transparent; transition: 0.2s; flex-shrink: 0; }
        .p4-list-item:hover { border-left-color: var(--c-secondary); background: #F8F9FA; }
        .p4-list-date { width: 110px; flex-shrink: 0; text-align: center; border-right: 2px dashed #E6E7E9; padding-right: 15px; }
        .p4-list-month { font-size: 12px; color: var(--c-text-light); font-weight: bold; text-transform: uppercase; }
        .p4-list-day { font-size: 24px; color: var(--c-primary); font-family: var(--font-head); font-weight: 900; line-height: 1; margin: 4px 0; }
        .p4-list-time { font-size: 11px; color: var(--c-text-light); background: rgba(0,0,0,0.05); padding: 2px 6px; border-radius: 4px; display: inline-block;}
        .p4-list-content { flex: 1; }
        .p4-list-title { font-size: 16px; font-weight: bold; color: var(--c-text); margin-bottom: 5px; }
        .p4-list-detail { font-size: 13px; color: var(--c-text-light); display: flex; flex-direction: column; gap: 3px; }
        .item-add-del { position: absolute; right: -15px; top: 10px; display: flex; flex-direction: column; gap: 4px; opacity: 0; transition: 0.2s; }
        .p4-card:hover .item-add-del, .p4-list-item:hover .item-add-del { opacity: 1; }
        .item-add-del button { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--c-primary); background: #fff; color: var(--c-primary); font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; padding: 0; }
        .item-add-del button:hover { background: var(--c-primary); color: #fff; }

        /* 提示框 */
        .toast { position: fixed; bottom: 20px; right: 20px; background: var(--canva-accent); color: white; padding: 12px 24px; border-radius: 8px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transform: translateY(100px); opacity: 0; transition: 0.3s; z-index: 100; }
        .toast.show { transform: translateY(0); opacity: 1; }

        /* 匯出功能彈出視窗 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 999; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.2s; }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--canva-ui-panel); color: white; width: min(340px, calc(100vw - 32px)); border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; transform: translateY(-20px); transition: 0.3s; }
        .modal-overlay.show .modal-content { transform: translateY(0); }
        .modal-header { background: var(--canva-accent); padding: 15px 20px; font-size: 16px; font-weight: bold; }
        .modal-body { padding: 20px; }
        .export-option { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; cursor: pointer; font-size: 14px; }
        .export-option input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--canva-accent); }
        .modal-footer { padding: 15px 20px; border-top: 1px solid #3F4042; display: flex; justify-content: flex-end; gap: 10px; }
        .modal-btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-family: var(--font-body); font-size: 13px; }
        .modal-btn-cancel { background: #3F4042; color: white; }
        .modal-btn-cancel:hover { background: #4F5052; }
        .modal-btn-confirm { background: var(--canva-accent); color: white; }
        .modal-btn-confirm:hover { background: #7A33E6; }

        /* --- 觸控裝置：沒有 hover 可用，所有靠 :hover 現身的控制項一律常駐 --- */
        @media (hover: none) {
            .item-controls, .photo-tools, .item-add-del, .floating-item .delete-btn { opacity: 1; }
            .collage-item::after { opacity: 1; }
            [contenteditable="true"] { outline: 1px dashed rgba(139, 61, 255, 0.35); }
            /* 放大點擊區，24px 以下在手指上幾乎按不到 */
            .item-controls button { width: 32px; height: 32px; font-size: 20px; }
            .item-add-del button { width: 30px; height: 30px; font-size: 15px; }
            .item-add-del { right: -12px; gap: 6px; }
            .floating-item .delete-btn { width: 30px; height: 30px; }

            /* 瀏覽器原生的 resize 握把只吃滑鼠，觸控上是個死角，換成自製握把。
               touch-action 只掛在這 22px 的握把上，元件其餘部分照常可以捲動頁面。 */
            .resize-x, .resize-both { resize: none; }
            .touch-resize-handle {
                display: block; position: absolute; bottom: 0; right: 0;
                /* 尺寸要抵銷畫布縮放，否則畫布縮到 0.62 時握把只剩約 14px，手指按不準。
                   除以 scale 讓它在螢幕上維持約 24px，再加上限避免小文字框被握把蓋滿。 */
                width: min(38px, calc(24px / var(--canvas-scale)));
                height: min(38px, calc(24px / var(--canvas-scale)));
                z-index: 30;
                touch-action: none; cursor: nwse-resize; user-select: none; -webkit-user-select: none;
                opacity: 0.7;
                background: linear-gradient(135deg, transparent 46%, var(--canva-accent) 46%, var(--canva-accent) 58%,
                            transparent 58%, transparent 70%, var(--canva-accent) 70%, var(--canva-accent) 82%, transparent 82%);
            }
            .touch-resize-handle:active { opacity: 1; }
        }

        /* --- 窄螢幕版面 --- */
        @media (max-width: 820px) {
            .top-nav { padding: 0 8px; overflow-x: auto; scrollbar-width: none; }
            .top-nav::-webkit-scrollbar { display: none; }
            .nav-logo { font-size: 0; margin-right: 12px; flex-shrink: 0; }
            .nav-logo span { font-size: 12px; }
            .tool-tab { padding: 12px 12px; font-size: 12px; flex-shrink: 0; white-space: nowrap; }
            .export-tab { position: sticky; right: 0; margin-left: 8px; padding: 8px 12px; box-shadow: -8px 0 8px var(--canva-ui-bg); }

            /* 控制列吃掉太多高度會讓畫布無處容身，設上限並允許內部捲動 */
            .sub-panel-container { max-height: 32vh; overflow-y: auto; }
            .sub-panel { padding: 10px 12px; gap: 14px; flex-direction: column; align-items: stretch; }
            .sub-panel.active { display: flex; }
            .btn-row { max-width: none; }
            .btn { padding: 10px 14px; font-size: 13px; }
            .tip-box { margin-left: 0; }

            .workspace { padding: 34px 10px 20px; }
            .toast { left: 12px; right: 12px; bottom: 12px; text-align: center; }
        }

        /* 🔥🔥🔥 真正的向量 PDF 輸出核心：瀏覽器原生列印 CSS 引擎 🔥🔥🔥 */
        #print-zone { display: none; }
        
        @media print {
            /* 1. 隱藏所有編輯器操作介面 */
            .top-nav, .sub-panel-container, .workspace, .toast, .modal-overlay { display: none !important; }
            
            /* 2. 重設頁面基礎，強制啟動背景圖形列印 (-webkit-print-color-adjust) */
            body { background: var(--c-bg); margin: 0; padding: 0; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            
            /* 3. 顯示我們在背景偷偷生成的「列印專用排版區」 */
            #print-zone { display: block !important; position: absolute; top: 0; left: 0; width: 100%; }
            
            /* 4. 精準定義 A4 實體尺寸 (210x297mm) 與分頁邏輯 */
            .print-canvas {
                width: 210mm !important;
                height: 297mm !important;
                page-break-after: always;
                box-shadow: none !important;
                margin: 0 !important;
                border: none !important;
                transform: none !important;
                background-color: var(--c-bg) !important;
            }
            .print-canvas:last-child { page-break-after: auto; }
            @page { size: A4 portrait; margin: 0; }
            
            /* 5. 清除所有編輯用的提示框線、捲動軸與小按鈕，確保 PDF 版面極度乾淨 */
            [contenteditable] { outline: none !important; resize: none !important; }
            .resize-x, .resize-both { resize: none !important; }
            .item-add-del, .photo-tools, .delete-btn, .timeline-add-btn, .touch-resize-handle { display: none !important; }
            .collage-item::after { display: none !important; }
            ::-webkit-scrollbar { display: none !important; }
            .timeline-container, .p4-scroll-area, .p4-list-scroll { overflow: visible !important; height: auto !important; }
        }
    </style>
</head>
<body>

    <!-- 頂部主導覽列 -->
    <div class="top-nav">

                    <button class="gallery-btn" onclick="replaceMainImage('https://images.unsplash.com/photo-1573164713988-8665fc963095?auto=format&fit=crop&w=800&q=80')"><img src="https://images.unsplash.com/photo-1573164713988-8665fc963095?auto=format&fit=crop&w=200&q=80"></button>
                    <button class="gallery-btn" onclick="replaceMainImage('https://images.unsplash.com/photo-1475721027785-f74eccf877e2?auto=format&fit=crop&w=800&q=80')"><img src="https://images.unsplash.com/photo-1475721027785-f74eccf877e2?auto=format&fit=crop&w=200&q=80"></button>
                    <button class="gallery-btn" onclick="replaceMainImage('https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=800&q=80')"><img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=200&q=80"></button>

                    我們將喚醒系統原生的列印引擎，為您製作文字可選取、可無限放大的真正 PDF。<br><br>請勾選您要包含的頁面：
                </div>

    <!-- 🔥 隱藏的列印與 PDF 輸出專用區塊 -->
    <div id="print-zone"></div>

    <script>
        // --- 核心資料狀態 ---
        let state = {
            theme: 'A',
            page: 1,
            layouts: { 1: 'A', 2: 'A', 3: 'C5', 4: 'A' }
        };

        const templatesData = {
            1: { variants: [{ id: 'A', name: '雜誌封面型' }, { id: 'B', name: '權威雙欄型' }] },
            2: { variants: [{ id: 'A', name: '時間軸型' }] },
            3: { variants: [] },
            4: { variants: [{ id: 'A', name: '雙欄資訊卡 (正式菁英感)' }, { id: 'B', name: '現代行事曆 (清晰俐落)' }] }
        };

        let globalZIndex = 100;

        // --- 0. 畫布自動縮放 ---
        // 畫布是固定的 595x842 (A4 @72dpi) 設計座標，手機螢幕塞不下。
        // 這裡量出 workspace 可用寬度換算縮放比，寫進 --canvas-scale 由 CSS 套用；
        // 桌機空間足夠時維持 1，外觀與行為完全不變。
        const CANVAS_W = 595, CANVAS_H = 842;
        let canvasScale = 1;

        function fitCanvas() {
            const ws = document.querySelector('.workspace');
            if (!ws) return;
            const cs = getComputedStyle(ws);
            const avail = ws.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
            canvasScale = Math.min(1, avail / CANVAS_W);
            document.documentElement.style.setProperty('--canvas-scale', canvasScale.toFixed(4));
        }

        window.addEventListener('resize', fitCanvas);
        window.addEventListener('orientationchange', fitCanvas);

        // --- 全局共用函數 ---
        window.cloneItem = function(btn) {
            const item = btn.closest('.p4-card') || btn.closest('.p4-list-item');
            const clone = item.cloneNode(true);
            item.parentNode.insertBefore(clone, item.nextSibling);
            showToast('✅ 已新增一筆預告事項！');
        };
        window.delItem = function(btn) {
            const item = btn.closest('.p4-card') || btn.closest('.p4-list-item');
            item.remove();
            showToast('🗑️ 已刪除該項目。');
        };

        // --- 1. 面板切換 ---
        function switchPanel(panelId, btnElement) {
            document.querySelectorAll('.tool-tab').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            document.querySelectorAll('.sub-panel').forEach(panel => panel.classList.remove('active'));
            document.getElementById(`panel-${panelId}`).classList.add('active');
        }

        // --- 2. 品牌色調 ---
        function changeTheme(theme, btnElement) {
            if (btnElement) {
                btnElement.closest('.btn-row').querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
                btnElement.classList.add('active');
            }
            const root = document.documentElement;
            if (theme === 'A') {
                root.style.setProperty('--c-primary', '#00246B'); root.style.setProperty('--c-secondary', '#D4AF37'); root.style.setProperty('--c-bg', '#F8F9FA');
            } else if (theme === 'B') {
                root.style.setProperty('--c-primary', '#0F4C81'); root.style.setProperty('--c-secondary', '#F7A81B'); root.style.setProperty('--c-bg', '#FFFFFF');
            } else if (theme === 'C') {
                root.style.setProperty('--c-primary', '#222222'); root.style.setProperty('--c-secondary', '#E05A47'); root.style.setProperty('--c-bg', '#F4F1EA');
            }
        }

        // --- 3. 頁面與樣式渲染 ---
        // 離開頁面時把當下的 DOM 原封收起來，回來時再放回去。
        // 沒有這層快取，換過頁的頁面在匯出時會被範本重新生成一次，
        // 使用者上傳的照片和改過的文字全部會被打回預設值。
        const pageCache = {};
        const pageKey = (page, layout) => page + ':' + layout;

        function stashCurrentPage() {
            const container = document.getElementById('page-content');
            if (container && container.innerHTML.trim()) {
                pageCache[pageKey(state.page, state.layouts[state.page])] = container.innerHTML;
            }
        }

        function changePage(page, btnElement) {
            if (btnElement) {
                btnElement.closest('.btn-row').querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
                btnElement.classList.add('active');
            }
            stashCurrentPage();
            state.page = page;
            document.getElementById('page-number').innerText = `PAGE 0${page}`;
            renderLayoutSelector();
            renderCanvas();
        }

        function renderLayoutSelector() {
            const container = document.getElementById('layout-selector');
            let html = '';
            if (state.page === 3) {
                const currentStyle = state.layouts[3].charAt(0);
                const currentCount = state.layouts[3].charAt(1);
                html += `
                    <div style="display:flex; flex-direction:column; gap:10px; width: 100%;">
                        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
                            <span style="font-size:11px; color:#A6A7A9; font-weight:bold;">1. 風格：</span>
                            <div class="btn ${currentStyle === 'C' ? 'active' : ''}" onclick="changeP3Layout('C', '${currentCount}')">動態拼接 (手機最佳化)</div>
                            <div class="btn ${currentStyle === 'G' ? 'active' : ''}" onclick="changeP3Layout('G', '${currentCount}')">整齊網格 (傳統對齊)</div>
                        </div>
                        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
                            <span style="font-size:11px; color:#A6A7A9; font-weight:bold;">2. 張數：</span>
                            ${[5,6,7,8,9].map(n => `<div class="btn ${currentCount == n ? 'active' : ''}" onclick="changeP3Layout('${currentStyle}', '${n}')">${n} 張</div>`).join('')}
                        </div>
                    </div>
                `;
            } else {
                templatesData[state.page].variants.forEach(v => {
                    const active = state.layouts[state.page] === v.id ? 'active' : '';
                    html += `<div class="btn ${active}" onclick="changeLayout('${v.id}', this, '${v.name}')">${v.name}</div>`;
                });
            }
            container.innerHTML = html;
        }

        function changeP3Layout(style, count) {
            stashCurrentPage();
            state.layouts[3] = style + count;
            renderLayoutSelector();
            renderCanvas();
        }

        function changeLayout(layoutId, btnElement, layoutName) {
            document.querySelectorAll('#layout-selector .btn').forEach(b => b.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
            stashCurrentPage();
            state.layouts[state.page] = layoutId;
            renderCanvas();
        }

        // --- 🔥 將頁面 HTML 產生器獨立模組化，方便主畫面與 PDF 輸出共同呼叫 ---
        function getPageContentHTML(page, layout) {
            if (page === 1 && layout === 'A') {
                return `
                    <div class="layout-p1a">
                        <div class="text-area">

        // --- 4. 畫布內容生成與渲染 ---
        function renderCanvas() {
            const container = document.getElementById('page-content');
            const page = state.page;
            const layout = state.layouts[page];
            
            let layoutName = '';
            if (page === 3) {
                const styleName = layout.charAt(0) === 'C' ? '動態拼接' : '整齊網格';
                layoutName = `${styleName} (${layout.charAt(1)}張)`;
            } else {
                layoutName = templatesData[page].variants.find(v => v.id === layout).name;
            }
            document.getElementById('canvas-label').innerText = `Page ${page}: ${layoutName}`;

            // 將 HTML 寫入畫面 (回到編輯過的頁面時用快取，保住上傳的照片與改過的字)
            container.innerHTML = pageCache[pageKey(page, layout)] || getPageContentHTML(page, layout);
            addTouchHandles();

            // 重新綁定 P3 動態拼接的拖曳事件
            if (page === 3 && layout.charAt(0) === 'C') {
                setTimeout(() => { document.querySelectorAll('.collage-item').forEach(el => makeDraggable(el)); }, 50);
            }
        }

        // --- 5. 圖片替換與旋轉工具 ---
        function replaceMainImage(newSrc) {
            const mainImg = document.querySelector('.editable-image');
            if (mainImg) {
                mainImg.style.opacity = '0.5';
                setTimeout(() => { mainImg.src = newSrc; mainImg.style.opacity = '1'; showToast('📸 圖片已成功替換！'); }, 200);
            } else {
                showToast('⚠️ 本頁沒有相片區塊喔！');
            }
        }

        // --- 5.1 從手機相簿 / 電腦挑照片 ---
        // 手機拍的照片動輒 3~5MB，九張貼進來頁面會重到跑不動，列印也會卡住。
        // 長邊壓到 1600px：A4 上最寬的相片印出來仍有 300dpi 以上，檔案卻小一個量級。
        const MAX_IMAGE_EDGE = 1600;
        const IMAGE_QUALITY = 0.85;

        let pendingImageTarget = null;
        const imagePicker = document.createElement('input');
        imagePicker.type = 'file';
        imagePicker.accept = 'image/*';
        imagePicker.style.display = 'none';
        document.body.appendChild(imagePicker);

        imagePicker.addEventListener('change', function () {
            const file = this.files && this.files[0];
            this.value = '';   // 清掉才能連續挑同一張照片
            const target = pendingImageTarget;
            pendingImageTarget = null;
            if (!file || !target) return;

            target.style.opacity = '0.5';
            shrinkImage(file, function (dataUrl) {
                target.src = dataUrl;
                target.style.opacity = '1';
                showToast('✅ 照片已更新！');
            }, function () {
                target.style.opacity = '1';
                showToast('⚠️ 這個檔案讀不出來，請換一張照片試試。');
            });
        });

        function uploadImage(imgElement) {
            if (!imgElement) { showToast('⚠️ 本頁沒有相片區塊喔！'); return; }
            pendingImageTarget = imgElement;
            imagePicker.click();
        }

        // 拼貼模式的相片本身是 pointer-events:none (才不會擋住拖曳)，
        // 所以改由工具列的相機鈕代為指定要換哪一張。
        function uploadCollageImage(btn) {
            const item = btn.closest('.collage-item');
            uploadImage(item && item.querySelector('img'));
        }

        function uploadMainImage() {
            uploadImage(document.querySelector('.editable-image'));
        }

        function shrinkImage(file, onDone, onError) {
            const reader = new FileReader();
            reader.onerror = onError;
            reader.onload = function () {
                const img = new Image();
                img.onerror = onError;
                img.onload = function () {
                    const longest = Math.max(img.width, img.height);
                    // 本來就夠小就直接用原檔，不必再編碼一次而損失畫質
                    if (longest <= MAX_IMAGE_EDGE) { onDone(reader.result); return; }
                    const ratio = MAX_IMAGE_EDGE / longest;
                    const c = document.createElement('canvas');
                    c.width = Math.round(img.width * ratio);
                    c.height = Math.round(img.height * ratio);
                    c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
                    onDone(c.toDataURL('image/jpeg', IMAGE_QUALITY));
                };
                img.src = reader.result;
            };
            reader.readAsDataURL(file);
        }

        function startRotate(e, btn) {
            e.preventDefault();
            e.stopPropagation();

            const el = btn.closest('.collage-item');
            bringToFront(btn);

            const rect = el.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            // 角度在等比縮放下不變，因此這裡不需要換算 canvasScale。
            const startAngle = Math.atan2(e.clientY - centerY, e.clientX - centerX) * (180 / Math.PI);
            const currentRot = parseFloat(el.getAttribute('data-rotation')) || 0;

            function onPointerMove(moveEvent) {
                const currentAngle = Math.atan2(moveEvent.clientY - centerY, moveEvent.clientX - centerX) * (180 / Math.PI);
                const newRot = currentRot + (currentAngle - startAngle);
                el.setAttribute('data-rotation', newRot);
                el.style.transform = `rotate(${newRot}deg)`;
            }

            function onPointerUp(upEvent) {
                if (btn.hasPointerCapture(upEvent.pointerId)) btn.releasePointerCapture(upEvent.pointerId);
                btn.onpointermove = null; btn.onpointerup = null; btn.onpointercancel = null;
            }

            btn.setPointerCapture(e.pointerId);
            btn.onpointermove = onPointerMove;
            btn.onpointerup = btn.onpointercancel = onPointerUp;
        }

        function bringToFront(btn) {
            const el = btn.closest('.collage-item') || btn.closest('.floating-item');
            if(el) el.style.zIndex = ++globalZIndex;
        }

        // --- 6. 浮動元件與共用拖曳邏輯 ---
        function addFloatingText(type) {
            const canvas = document.getElementById('canvas');
            const el = document.createElement('div');
            el.className = 'floating-item';

            textDiv.className = 'resize-both';
            
            if (type === 'h1') { textDiv.innerText = '新增大標題'; textDiv.style.fontFamily = 'var(--font-head)'; textDiv.style.fontSize = '36px'; textDiv.style.fontWeight = 'bold'; textDiv.style.color = 'var(--c-primary)'; }
            else if (type === 'h2') { textDiv.innerText = '新增小標題'; textDiv.style.fontFamily = 'var(--font-body)'; textDiv.style.fontSize = '20px'; textDiv.style.fontWeight = 'bold'; textDiv.style.color = 'var(--c-secondary)'; }
            else { textDiv.innerText = '請在此輸入您的內文...'; textDiv.style.fontFamily = 'var(--font-body)'; textDiv.style.fontSize = '13px'; textDiv.style.color = 'var(--c-text)'; }

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn'; deleteBtn.innerText = '✕'; deleteBtn.onclick = () => el.remove();

            el.appendChild(textDiv); el.appendChild(deleteBtn);
            el.style.top = '40%'; el.style.left = '30%'; el.style.zIndex = ++globalZIndex;
            canvas.appendChild(el); makeDraggable(el); addTouchHandles();
            showToast('📝 已新增文字 (可按住邊緣拖曳)');
        }

        function addFloatingElement(emoji) {
            const canvas = document.getElementById('canvas');
            const el = document.createElement('div');
            el.className = 'floating-item';
            
            const iconDiv = document.createElement('div');
            iconDiv.innerText = emoji; iconDiv.style.fontSize = '50px'; iconDiv.style.lineHeight = '1';

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn'; deleteBtn.innerText = '✕'; deleteBtn.onclick = () => el.remove();

            el.appendChild(iconDiv); el.appendChild(deleteBtn);
            el.style.top = '30%'; el.style.left = '40%'; el.style.zIndex = ++globalZIndex;
            canvas.appendChild(el); makeDraggable(el);
            showToast('✨ 已新增元素 (可按住邊緣拖曳)');
        }

        // 用 Pointer Events 取代 mouse events，同一份程式碼即可支援滑鼠與觸控。
        function makeDraggable(elmnt) {
            let lastX = 0, lastY = 0;
            elmnt.onpointerdown = dragPointerDown;

            function dragPointerDown(e) {
                if(e.target.hasAttribute('contenteditable') || e.target.tagName === 'BUTTON') return;
                if (e.target === elmnt || e.target.classList.contains('resize-both')) {
                    if (e.offsetX > e.target.offsetWidth - 25 && e.offsetY > e.target.offsetHeight - 25) return;
                }
                e.preventDefault();
                elmnt.style.zIndex = ++globalZIndex;
                lastX = e.clientX; lastY = e.clientY;
                elmnt.setPointerCapture(e.pointerId);
                elmnt.onpointermove = elementDrag;
                elmnt.onpointerup = elmnt.onpointercancel = closeDragElement;
            }
            function elementDrag(e) {
                e.preventDefault();
                // 螢幕位移要除以縮放比，才會換算回畫布的設計座標，
                // 否則畫布縮小時元件會跑得比手指快。
                const dx = (e.clientX - lastX) / canvasScale;
                const dy = (e.clientY - lastY) / canvasScale;
                lastX = e.clientX; lastY = e.clientY;
                elmnt.style.top = (elmnt.offsetTop + dy) + "px";
                elmnt.style.left = (elmnt.offsetLeft + dx) + "px";
            }
            function closeDragElement(e) {
                if (elmnt.hasPointerCapture(e.pointerId)) elmnt.releasePointerCapture(e.pointerId);
                elmnt.onpointermove = null; elmnt.onpointerup = null; elmnt.onpointercancel = null;
            }
        }

        // --- 6.2 觸控縮放 ---
        // 只有觸控裝置需要，桌機沿用瀏覽器原生的 resize，不注入任何節點。
        const isTouchDevice = window.matchMedia('(hover: none)').matches;

        function addTouchHandles() {
            if (!isTouchDevice) return;
            // 排除拍立得說明文字：它本來就貼齊相片寬度，而且握把會和相片自己的握把疊在一起
            document.querySelectorAll('#canvas .resize-x:not(.polaroid-caption), #canvas .resize-both').forEach(el => {
                if (el.querySelector(':scope > .touch-resize-handle')) return;
                // 握把要靠 absolute 貼在右下角，元件本身得先是個定位參考點。
                // 有些元件 (如 .polaroid-caption) 本來就是 absolute，別去動它。
                if (getComputedStyle(el).position === 'static') el.style.position = 'relative';
                const handle = document.createElement('i');
                handle.className = 'touch-resize-handle';
                // 這些元件多半是 contenteditable，標成不可編輯才不會被當成內文
                handle.contentEditable = 'false';
                el.appendChild(handle);
            });
        }

        // 用 capture 階段攔截：stopPropagation 可以擋掉 .collage-item 自己的拖曳處理，
        // 避免同一根手指同時觸發「移動」與「縮放」。
        document.addEventListener('pointerdown', function (e) {
            if (e.target.classList && e.target.classList.contains('touch-resize-handle')) {
                e.stopPropagation();
                startTouchResize(e);
            }
        }, true);

        function startTouchResize(e) {
            const handle = e.target;
            const el = handle.parentElement;
            if (!el) return;
            e.preventDefault();

            const bothAxes = el.classList.contains('resize-both');
            const rot = (parseFloat(el.getAttribute('data-rotation')) || 0) * Math.PI / 180;
            const cos = Math.cos(rot), sin = Math.sin(rot);
            const startX = e.clientX, startY = e.clientY;
            // 用 computed width/height 而非 offsetWidth：offsetWidth 含 padding，
            // 拿它當基準再寫回 style.width 會讓元件每縮放一次就多長出一份 padding。
            const cs = getComputedStyle(el);
            const startW = parseFloat(cs.width), startH = parseFloat(cs.height);

            handle.setPointerCapture(e.pointerId);
            handle.onpointermove = function (mv) {
                // 位移先除以縮放比回到設計座標，再逆旋轉投影到元件自身的軸向，
                // 旋轉過的拼貼照片才會沿著「它自己的」邊縮放，而不是螢幕的水平垂直。
                const dx = (mv.clientX - startX) / canvasScale;
                const dy = (mv.clientY - startY) / canvasScale;
                el.style.width = Math.max(40, startW + dx * cos + dy * sin) + 'px';
                if (bothAxes) el.style.height = Math.max(28, startH - dx * sin + dy * cos) + 'px';
            };
            handle.onpointerup = handle.onpointercancel = function (up) {
                if (handle.hasPointerCapture(up.pointerId)) handle.releasePointerCapture(up.pointerId);
                handle.onpointermove = null; handle.onpointerup = null; handle.onpointercancel = null;
            };
        }

        // --- 6.5 P2 流程項目動態增減功能 ---
        function addTimelineItem(btn) {
            const currentItem = btn.closest('.timeline-item');
            const newItem = currentItem.cloneNode(true);
            newItem.querySelector('.event-name').innerText = "新增流程主題";
            newItem.querySelector('.event-person').innerText = "負責人";
            newItem.querySelector('.duration').innerText = "10 分鐘";
            currentItem.parentNode.insertBefore(newItem, currentItem.nextSibling);
            recalculateTimeline();
            showToast('✅ 已成功新增一項流程！');
        }

        function removeTimelineItem(btn) {
            const timeline = btn.closest('.timeline');
            if (timeline.querySelectorAll('.timeline-item').length <= 1) {
                showToast('⚠️ 至少需保留一項會議流程！');
                return;
            }
            btn.closest('.timeline-item').remove();
            recalculateTimeline();
            showToast('🗑️ 已刪除該流程項目！');
        }

        function addTimelineItemBottom() {
            const timeline = document.getElementById('agenda-timeline');
            if (!timeline) return;
            const items = timeline.querySelectorAll('.timeline-item');
            if (items.length > 0) {
                const lastItem = items[items.length - 1];
                const newItem = lastItem.cloneNode(true);
                newItem.querySelector('.event-name').innerText = "新增流程主題";
                newItem.querySelector('.event-person').innerText = "負責人";
                newItem.querySelector('.duration').innerText = "10 分鐘";
                timeline.appendChild(newItem);
                recalculateTimeline();
                showToast('✅ 已在最下方新增一項流程！');
            }
        }

        // --- 7. P2 時間軸自動計算連動 ---
        function recalculateTimeline() {
            const items = Array.from(document.querySelectorAll('.timeline-item'));
            if (!items.length) return;
            const firstTimeStr = items[0].querySelector('.time').innerText.trim();
            let [hours, minutes] = firstTimeStr.split(':').map(Number);
            if (isNaN(hours) || isNaN(minutes)) return;

            let currentTotalMinutes = hours * 60 + minutes;

            for (let i = 0; i < items.length - 1; i++) {
                const durationStr = items[i].querySelector('.duration').innerText;
                const match = durationStr.match(/\d+/); 
                const minsToAdd = match ? parseInt(match[0], 10) : 0;
                currentTotalMinutes += minsToAdd;

                const nextHours = Math.floor(currentTotalMinutes / 60) % 24;
                const nextMins = currentTotalMinutes % 60;
                const nextTimeStr = `${String(nextHours).padStart(2, '0')}:${String(nextMins).padStart(2, '0')}`;

                const nextTimeEl = items[i+1].querySelector('.time');
                if (nextTimeEl.innerText.trim() !== nextTimeStr) {
                    nextTimeEl.innerText = nextTimeStr;
                }
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg; toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        // --- 🔥 8. 真正的原生向量 PDF 引擎 (Native Print) ---
        function showExportModal() {
            document.getElementById('export-modal').classList.add('show');
        }

        function hideExportModal() {
            document.getElementById('export-modal').classList.remove('show');
        }

        function startPDFExport() {
            const pagesToExport = [];
            if(document.getElementById('export-p1').checked) pagesToExport.push(1);
            if(document.getElementById('export-p2').checked) pagesToExport.push(2);
            if(document.getElementById('export-p3').checked) pagesToExport.push(3);
            if(document.getElementById('export-p4').checked) pagesToExport.push(4);

            if (pagesToExport.length === 0) {
                showToast("⚠️ 請至少選擇一頁進行匯出！");
                return;
            }

            hideExportModal();
            showToast("⏳ 系統正在為您啟動瀏覽器原生列印引擎...");
            
            if (document.activeElement) document.activeElement.blur();

            const printZone = document.getElementById('print-zone');
            printZone.innerHTML = ''; // 清空列印區塊

            // 抓取目前畫面上顯示的頁首與頁尾狀態
            const headerHTML = document.querySelector('.page-header').outerHTML;
            const footerTitle = document.querySelector('.page-footer span:first-child').innerText;

            // 動態組裝所選的頁面到隱藏的 print-zone 裡
            for (let i = 0; i < pagesToExport.length; i++) {
                const pageNum = pagesToExport[i];
                const pageWrapper = document.createElement('div');
                
                // 賦予 .canvas 以繼承原有的設計排版，並加上 .print-canvas 觸發 A4 列印約束
                pageWrapper.className = 'canvas print-canvas'; 
                
                if (pageNum === state.page) {
                    // 如果是目前正在編輯的頁面，直接複製它的 DOM，這樣執秘的所有修改都會被完美保留！
                    pageWrapper.innerHTML = document.getElementById('canvas').innerHTML;
                } else {
                    // 沒顯示在畫面上的頁面：優先用快取 (才不會把編輯過的內容洗掉)，
                    // 從沒開過的頁面才用模組化函數生成預設版型
                    const cached = pageCache[pageKey(pageNum, state.layouts[pageNum])];
                    pageWrapper.innerHTML = `
                        ${headerHTML}
                        <div class="page-content">
                            ${cached || getPageContentHTML(pageNum, state.layouts[pageNum])}
                        </div>
                        <div class="page-footer" contenteditable="false">
                            <span contenteditable="true">${footerTitle}</span>
                            <span>PAGE 0${pageNum}</span>
                        </div>
                    `;
                }

                // 準備好後，把不該出現在 PDF 上的輔助按鈕全部刪除
                pageWrapper.querySelectorAll('.item-controls, .photo-tools, .timeline-add-btn, .delete-btn, .touch-resize-handle').forEach(el => el.remove());
                
                printZone.appendChild(pageWrapper);
            }

            // 稍微等待 0.8 秒，讓動態拼接的 CSS Grid 與相片完全載入對齊
            setTimeout(() => {
                showToast("✅ 請在跳出的列印視窗中，將目的地選擇為「另存為 PDF」，即可獲得真正向量檔！");
                // 喚醒瀏覽器原生列印功能
                window.print();
            }, 800);
        }

        // 初始化
        fitCanvas();
        renderLayoutSelector();
        renderCanvas();
    </script>
</body>
</html>
